# Redis and Postgres for local PSF backend. Start with: docker compose up -d
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: psf
      POSTGRES_USER: psf
      POSTGRES_PASSWORD: psf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psf -d psf"]
      interval: 2s
      timeout: 2s
      retries: 5
